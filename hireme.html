<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hire Me</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 420px;
            text-align: center;
            border: 1px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56,189,248,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 15px;
        }

        p {
            margin: 10px 0;
        }

        .highlight {
            color: #38bdf8;
            font-weight: bold;
        }

        .buttons a {
            text-decoration: none;
        }

        button {
            margin: 8px;
            padding: 10px 15px;
            border: none;
            background: #38bdf8;
            color: black;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: white;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Hire Me</h1>

    <p>I am open to <span class="highlight">internships and job opportunities</span>.</p>

    <p>📞 Phone: +91 9548279358</p>
    <p>📧 Email: nitinprajapati90846@gmail.com</p>

    <div class="buttons">
        <a href="https://github.com/dashboard" target="_blank">
            <button>GitHub</button>
        </a>

        <a href="https://www.linkedin.com/in/YOUR-PROFILE" target="_blank">
            <button>LinkedIn</button>
        </a>

        <a href="https://www.instagram.com/nitin_prjaptiii?igsh=MTk2dHduc3UycDh0ZQ==" target="_blank">
            <button>Instagram</button>
        </a>
    </div>

    <button onclick="window.close()">Back</button>
</div>

</body>
</html>
