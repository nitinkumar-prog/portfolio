<!DOCTYPE html>
<html>

<head>
    <title>JavaScript</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            border: 1px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        h1 {
            color: #38bdf8;
        }

        .highlight {
            color: #38bdf8;
            font-weight: bold;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: white;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>JavaScript</h1>
        <p>I use JavaScript to add interactivity.</p>
        <p>• DOM Manipulation <br> • Events <br> • Basic Logic <br> • UI Interaction</p>
        <button onclick="window.close()">Back</button>
    </div>
</body>

</html>
